<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 420px;
      height: 600px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: white;
      border-radius: 20px;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
    }
    
    .header h1 {
      font-size: 20px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status-badge {
      display: inline-block;
      background: #4CAF50;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      margin-top: 8px;
    }
    
    /* Status Panel */
    .status-panel {
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
    }
    
    .status-title {
      font-weight: bold;
      margin-bottom: 8px;
      color: #495057;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-messages {
      max-height: 80px;
      overflow-y: auto;
    }
    
    .status-message {
      padding: 4px 0;
      color: #6c757d;
      border-left: 3px solid #4CAF50;
      padding-left: 8px;
      margin-bottom: 4px;
      font-size: 10px;
      animation: fadeIn 0.3s ease;
    }
    
    .status-message.error {
      border-left-color: #dc3545;
      color: #dc3545;
    }
    
    .status-message.success {
      border-left-color: #28a745;
      color: #28a745;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    /* Messages Area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #ffffff;
    }
    
    .message {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    
    .message.user {
      align-items: flex-end;
    }
    
    .message.assistant {
      align-items: flex-start;
    }
    
    .message-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    
    .message.user .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.assistant .message-bubble {
      background: #f1f3f5;
      color: #212529;
      border-bottom-left-radius: 4px;
    }
    
    .message-time {
      font-size: 10px;
      color: #adb5bd;
      margin-top: 4px;
      margin-left: 8px;
      margin-right: 8px;
    }
    
    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      background: #f1f3f5;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #adb5bd;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }
    
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    
    /* Input Area */
    .input-area {
      padding: 16px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 12px;
    }
    
    .input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #dee2e6;
      border-radius: 25px;
      font-size: 13px;
      outline: none;
      transition: all 0.3s;
    }
    
    .input-area input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .input-area button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: transform 0.2s;
    }
    
    .input-area button:hover {
      transform: translateY(-1px);
    }
    
    .input-area button:active {
      transform: translateY(0);
    }
    
    /* Scrollbar */
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    
    .messages::-webkit-scrollbar-track {
      background: #f1f3f5;
    }
    
    .messages::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <span>🎓</span> Mulungushi AI
      </h1>
      <p>Your University Assistant</p>
      <div class="status-badge" id="connectionStatus">🟢 Connected</div>
    </div>
    
    <!-- Real-time Status Panel -->
    <div class="status-panel">
      <div class="status-title">
        <span>⚡</span> Agent Activity
      </div>
      <div class="status-messages" id="statusMessages">
        <div class="status-message">✅ Ready to assist</div>
      </div>
    </div>
    
    <div class="messages" id="messages"></div>
    
    <div class="input-area">
      <input type="text" id="input" placeholder="Type your question...">
      <button id="send">Send</button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
